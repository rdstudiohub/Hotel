<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رائل ڈائننگ ہوٹل - مینو</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Noto Nastaliq Urdu', 'Poppins', sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
    }
    
    /* Header / Hero */
    .hero {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      padding: 60px 20px 50px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,215,0,0.08) 0%, transparent 60%);
      animation: shimmer 8s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, -30px); }
    }
    .hero-content { position: relative; z-index: 1; }
    .hero h1 {
      font-size: 2.8em;
      font-weight: 700;
      background: linear-gradient(135deg, #f5af19, #f12711);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }
    .hero .subtitle {
      font-size: 1.1em;
      color: #c9b67e;
      letter-spacing: 3px;
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
    }
    .hero .tagline {
      font-size: 1em;
      color: #aaa;
      margin-top: 8px;
      font-family: 'Poppins', sans-serif;
    }
    .hero .divider {
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, #f5af19, #f12711);
      margin: 15px auto;
      border-radius: 2px;
    }
    
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 30px 20px;
    }
    
    /* Section Title */
    .section-title {
      text-align: center;
      margin: 40px 0 30px;
      position: relative;
    }
    .section-title h2 {
      font-size: 1.8em;
      font-weight: 700;
      color: #f5af19;
      display: inline-block;
      padding: 0 30px;
    }
    .section-title h2::before,
    .section-title h2::after {
      content: '✦';
      color: #f12711;
      font-size: 0.6em;
      vertical-align: middle;
      margin: 0 10px;
    }
    
    /* Menu Grid */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 25px;
    }
    
    /* Menu Card */
    .menu-card {
      background: linear-gradient(145deg, #16213e, #1a1a3e);
      border-radius: 20px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border: 1px solid rgba(255,215,0,0.1);
      position: relative;
    }
    .menu-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      border-color: rgba(255,215,0,0.3);
    }
    
    .menu-card .image-wrap {
      height: 220px;
      overflow: hidden;
      position: relative;
    }
    .menu-card .image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .menu-card:hover .image-wrap img {
      transform: scale(1.08);
    }
    
    .menu-card .badge {
      position: absolute;
      top: 15px;
      right: 15px;
      background: linear-gradient(135deg, #f5af19, #f12711);
      color: #fff;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.75em;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      box-shadow: 0 4px 10px rgba(241,39,17,0.3);
    }
    
    .menu-card .info {
      padding: 20px;
    }
    
    .menu-card .info .name {
      font-size: 1.3em;
      font-weight: 700;
      color: #fff;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .menu-card .info .name-ur {
      font-size: 1.5em;
      color: #f5af19;
    }
    
    .menu-card .info .name-en {
      font-size: 0.65em;
      color: #aaa;
      font-family: 'Poppins', sans-serif;
      font-weight: 400;
      direction: ltr;
      display: inline-block;
    }
    
    .menu-card .info .description {
      color: #bbb;
      font-size: 0.9em;
      line-height: 1.6;
      margin: 8px 0 12px;
      font-family: 'Noto Nastaliq Urdu', serif;
    }
    
    .menu-card .info .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid rgba(255,215,0,0.1);
    }
    .menu-card .info .price {
      font-family: 'Poppins', sans-serif;
      font-size: 1.2em;
      font-weight: 700;
      color: #f5af19;
    }
    .menu-card .info .price span {
      font-size: 0.7em;
      color: #888;
      font-weight: 400;
    }
    .menu-card .info .order-btn {
      background: linear-gradient(135deg, #f5af19, #f12711);
      color: #fff;
      border: none;
      padding: 8px 20px;
      border-radius: 25px;
      font-size: 0.85em;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Noto Nastaliq Urdu', serif;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .menu-card .info .order-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(241,39,17,0.4);
    }
    
    /* Special features badge */
    .featured-badge {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(5px);
      color: #f5af19;
      padding: 4px 12px;
      border-radius: 15px;
      font-size: 0.7em;
      font-family: 'Poppins', sans-serif;
      border: 1px solid rgba(255,215,0,0.3);
    }
    
    /* Footer */
    footer {
      background: linear-gradient(135deg, #0f0c29, #302b63);
      padding: 40px 20px;
      text-align: center;
      margin-top: 50px;
    }
    footer .footer-logo {
      font-size: 1.8em;
      font-weight: 700;
      background: linear-gradient(135deg, #f5af19, #f12711);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    footer .footer-info {
      color: #888;
      margin-top: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.85em;
      line-height: 1.8;
    }
    footer .footer-info span {
      color: #f5af19;
    }
    footer .footer-divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, #f5af19, #f12711);
      margin: 15px auto;
      border-radius: 2px;
    }
    footer .footer-hours {
      color: #aaa;
      font-family: 'Poppins', sans-serif;
      font-size: 0.8em;
      margin-top: 8px;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .hero h1 { font-size: 2em; }
      .menu-grid { grid-template-columns: 1fr; }
      .menu-card .image-wrap { height: 200px; }
    }
    
    @media (max-width: 480px) {
      .hero h1 { font-size: 1.6em; }
      .hero { padding: 40px 15px 35px; }
      .container { padding: 20px 15px; }
      .section-title h2 { font-size: 1.4em; }
    }
    
    /* Scroll to top */
    .scroll-top {
      position: fixed;
      bottom: 25px;
      left: 25px;
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #f5af19, #f12711);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 1.2em;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 100;
    }
    .scroll-top.visible { opacity: 0.8; }
    .scroll-top:hover { opacity: 1; }
  </style>
</head>
<body>
  <!-- Hero Section -->
  <header class="hero">
    <div class="hero-content">
      <h1>🍽️ رائل ڈائننگ ہوٹل</h1>
      <div class="divider"></div>
      <div class="subtitle">ROYAL DINING HOTEL</div>
      <div class="tagline">✦ روایتی ذائقے — جدید پیشکش ✦</div>
    </div>
  </header>
  
  <div class="container">
    <!-- Starters -->
    <div class="section-title">
      <h2>شروع کے پکوان</h2>
    </div>
    <div class="menu-grid" id="starters-grid"></div>
    
    <!-- Main Course -->
    <div class="section-title">
      <h2>مرکزی پکوان</h2>
    </div>
    <div class="menu-grid" id="main-grid"></div>
    
    <!-- Desserts -->
    <div class="section-title">
      <h2>میٹھے پکوان</h2>
    </div>
    <div class="menu-grid" id="desserts-grid"></div>
  </div>
  
  <!-- Footer -->
  <footer>
    <div class="footer-logo">🍽️ رائل ڈائننگ</div>
    <div class="footer-divider"></div>
    <div class="footer-info">
      📍 <span>123، شاہراہ فیصل، کراچی</span><br>
      📞 <span>+92 300 1234567</span>  |  📧 <span>info@royaldining.pk</span>
    </div>
    <div class="footer-hours">
      🕐 روزانہ: دوپہر 12:00 — رات 12:00
    </div>
  </footer>
  
  <!-- Scroll to top -->
  <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
  
  <script>
    const menuData = [
      {
        category: "starters",
        items: [
          {
            name: "چپلی کباب",
            nameEn: "Chapli Kebab",
            image: "images/chapli_kebab.png",
            description: "پشاوری طرز کے مصالحہ دار چپلی کباب، ہری چٹنی اور سلاد کے ساتھ — گرل پر پکائے گئے",
            price: "450",
            badge: "🔥 مشہور"
          },
          {
            name: "سموسے",
            nameEn: "Samosas",
            image: "images/samosas.png",
            description: "سنہری تلے ہوئے تکونے سموسے — قیمہ اور مصالحہ دار آلو کے آمیزے سے بھرپور",
            price: "250",
            badge: "⭐ پسندیدہ"
          }
        ]
      },
      {
        category: "main",
        items: [
          {
            name: "بریانی",
            nameEn: "Chicken Biryani",
            image: "images/biryani.png",
            description: "مصالحہ دار چکن بریانی — خوشبودار چاول، میرینیٹڈ چکن، اور ساتھ میں رائتا",
            price: "550",
            badge: "🏆 اسپیشل"
          },
          {
            name: "مرغ مکنی",
            nameEn: "Butter Chicken",
            image: "images/butter_chicken.png",
            description: "کریمی ٹماٹر اور مکھن والی گریوی میں تندوری چکن — نان یا پلاؤ کے ساتھ",
            price: "650",
            badge: "🔥 مشہور"
          },
          {
            name: "نہاری",
            nameEn: "Nihari",
            image: "images/nihari.png",
            description: "دھیمی آنچ پر رات بھر پکائی گئی نہاری — ادرک، لیموں اور ہری مرچ کے ساتھ",
            price: "700",
            badge: "⭐ شیف کی خاص"
          },
          {
            name: "حلیم",
            nameEn: "Haleem",
            image: "images/haleem.png",
            description: "بھرپور حلیم — گندم، جو، اور مٹن کو دھیمی آنچ پر پکایا گیا، بادام اور قیمہ تلی ہوئی سے سجا ہوا",
            price: "500",
            badge: "🍃 روایتی"
          },
          {
            name: "چکن کڑاہی",
            nameEn: "Chicken Karahi",
            image: "images/chicken_karahi.png",
            description: "تازہ مصالحوں، ٹماٹر، ادرک اور ہری مرچ کے ساتھ چکن کڑاہی — کڑاہی میں پکایا گیا",
            price: "600",
            badge: "🔥 مشہور"
          },
          {
            name: "روگن جوش",
            nameEn: "Rogan Josh",
            image: "images/rogan_josh.png",
            description: "کشمیری سرخ مٹن کا سالن — خاص مصالحوں کا آمیزہ اور خوشبودار گریوی",
            price: "680",
            badge: "🍃 روایتی"
          }
        ]
      },
      {
        category: "desserts",
        items: [
          {
            name: "جلیبی",
            nameEn: "Jalebi",
            image: "images/jalebi.png",
            description: "کرنچی سنہری جلیبیاں — کھوئے اور شکرے میں ڈوبی ہوئی، گرم گرم پیش کی گئیں",
            price: "300",
            badge: "🍯 میٹھا"
          },
          {
            name: "گلاب جامن",
            nameEn: "Gulab Jamun",
            image: "images/gulab_jamun.png",
            description: "نرم و ملائم گلاب جامن — گلاب کے عرق میں ڈوبے ہوئے، پستہ سے سجے ہوئے",
            price: "350",
            badge: "⭐ پسندیدہ"
          }
        ]
      }
    ];
    
    function renderCards(containerId, items) {
      const container = document.getElementById(containerId);
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'menu-card';
        
        card.innerHTML = `
          <div class="image-wrap">
            <img src="${item.image}" alt="${item.name}" loading="lazy">
            <div class="badge">${item.badge}</div>
          </div>
          <div class="info">
            <div class="name">
              <span class="name-ur">${item.name}</span>
            </div>
            <div class="name-en">${item.nameEn}</div>
            <div class="description">${item.description}</div>
            <div class="price-row">
              <div class="price">Rs. ${item.price} <span>/ سرونگ</span></div>
              <button class="order-btn" onclick="orderNow('${item.name}')">آرڈر کریں</button>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }
    
    renderCards('starters-grid', menuData[0].items);
    renderCards('main-grid', menuData[1].items);
    renderCards('desserts-grid', menuData[2].items);
    
    function orderNow(name) {
      alert('آپ نے "' + name + '" آرڈر کیا! براہِ کرم فون کریں: +92 300 1234567');
    }
    
    // Scroll to top button
    window.addEventListener('scroll', () => {
      document.getElementById('scrollTop').classList.toggle('visible', window.scrollY > 400);
    });
  </script>
</body>
</html>
